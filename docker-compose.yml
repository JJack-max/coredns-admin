# 一键部署：etcd + coredns-admin + CoreDNS
# 启动: docker compose up -d
# 默认管理员通过 ADMIN_USERNAME、ADMIN_PASSWORD 环境变量初始化（首次启动写入 etcd）

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: coredns-admin-etcd
    environment:
      ETCD_NAME: etcd0
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
      ETCD_DATA_DIR: /etcd-data
    volumes:
      - etcd_data:/etcd-data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "etcdctl",
          "endpoint",
          "health",
          "--endpoints=http://127.0.0.1:2379",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      my-net:
        ipv4_address: 172.30.0.7

  coredns:
    image: coredns/coredns:1.12.2
    container_name: coredns
    volumes:
      - ./docker/Corefile:/Corefile:ro
    command: ["-conf", "/Corefile"]
    depends_on:
      etcd:
        condition: service_healthy
    restart: unless-stopped
    networks:
      my-net:
        ipv4_address: 172.30.0.8

  coredns-admin:
    build: .
    image: coredns-admin:latest
    container_name: coredns-admin
    depends_on:
      etcd:
        condition: service_healthy
      coredns:
        condition: service_started
    env_file:
      - path: .env
        required: false
    environment:
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
    command: ["./coredns-admin", "-C", "/app/config.yaml"]
    restart: unless-stopped
    networks:
      my-net:
        ipv4_address: 172.30.0.9

volumes:
  etcd_data:

networks:
  my-net:
    external: true
